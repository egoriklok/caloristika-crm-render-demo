services:
  crm:
    build:
      context: .
    ports:
      - "${PORT:-3011}:3011"
    environment:
      NODE_ENV: production
      PORT: "3011"
      HOSTNAME: 0.0.0.0
      CRM_ACCESS_KEY: "${CRM_ACCESS_KEY:-}"
      CUSTOMER_PORTAL_SHARED_ACCESS_CODE: "${CUSTOMER_PORTAL_SHARED_ACCESS_CODE:-}"
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-}"
      LUNCH_UP_CRM_DB_PATH: /app/data/lunch_up_crm.sqlite
      LUNCH_UP_SQLITE_BUSY_TIMEOUT_MS: "${LUNCH_UP_SQLITE_BUSY_TIMEOUT_MS:-5000}"
      LUNCH_UP_SQLITE_MMAP_SIZE: "${LUNCH_UP_SQLITE_MMAP_SIZE:-268435456}"
      LUNCH_UP_SQLITE_WAL: "${LUNCH_UP_SQLITE_WAL:-1}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_WEBHOOK_SECRET: "${TELEGRAM_WEBHOOK_SECRET:-}"
      TELEGRAM_MANAGER_CHAT_ID: "${TELEGRAM_MANAGER_CHAT_ID:-}"
      TELEGRAM_OUTBOUND_DISABLED: "${TELEGRAM_OUTBOUND_DISABLED:-}"
      DGIS_API_KEY: "${DGIS_API_KEY:-}"
      DADATA_API_KEY: "${DADATA_API_KEY:-}"
      APIFY_TOKEN: "${APIFY_TOKEN:-}"
      APIFY_DEFAULT_RESEARCH_ACTOR_ID: "${APIFY_DEFAULT_RESEARCH_ACTOR_ID:-}"
      EXTERNAL_ORDER_WEBHOOK_URL: "${EXTERNAL_ORDER_WEBHOOK_URL:-}"
      EXTERNAL_ORDER_WEBHOOK_TOKEN: "${EXTERNAL_ORDER_WEBHOOK_TOKEN:-}"
      EXTERNAL_ORDER_WEBHOOK_PROVIDER: "${EXTERNAL_ORDER_WEBHOOK_PROVIDER:-}"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3011/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
